const { useState, useEffect, useRef } = React;

/* ---------- interactive network mesh background ---------- */
/* a dense web of drifting nodes linked when close. each node has a depth (z):
   nearer nodes are larger, brighter, drift faster, and link over more distance,
   while far ones recede — giving the net a real near/far composition. the
   pointer adds depth parallax (layers shift at different rates) and lights up
   the nodes and links around the cursor. */
function MeshBackground() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const LINK = 116;        // max link distance (scaled up for nearer nodes)
    const PTR = 180;         // pointer influence radius
    const DENSITY = 5200;    // one node per this many px² — lower = denser net
    const SPEED = 0.14;      // base drift speed
    const PARALLAX = 26;     // px of depth parallax driven by the pointer
    const RGB = "170,204,0"; // accent green

    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let w = 0, h = 0;
    let nodes = [];
    // pointer position + a smoothed value we ease toward for fluid motion
    const ptr = { x: -9999, y: -9999, active: false };
    const eased = { x: -9999, y: -9999 };

    const makeNodes = () => {
      const count = Math.round((w * h) / DENSITY);
      nodes = Array.from({ length: count }, () => {
        const z = Math.random();            // 0 = far, 1 = near
        return {
          x: Math.random() * w,
          y: Math.random() * h,
          z,
          // near nodes drift a touch faster — reinforces the depth read
          vx: (Math.random() - 0.5) * SPEED * (0.5 + z),
          vy: (Math.random() - 0.5) * SPEED * (0.5 + z),
          rx: 0, ry: 0,                       // per-frame parallax-shifted position
        };
      });
    };

    const resize = () => {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      makeNodes();
    };
    resize();

    const step = () => {
      // ease the highlight toward the pointer
      eased.x += (ptr.x - eased.x) * 0.1;
      eased.y += (ptr.y - eased.y) * 0.1;

      // pointer-driven parallax: offset from screen centre, near layers shift more
      const px = ptr.active ? (eased.x - w / 2) / (w / 2) : 0;
      const py = ptr.active ? (eased.y - h / 2) / (h / 2) : 0;

      // drift + wrap, then compute parallax-shifted render position
      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < -30) n.x = w + 30; else if (n.x > w + 30) n.x = -30;
        if (n.y < -30) n.y = h + 30; else if (n.y > h + 30) n.y = -30;
        const shift = (n.z - 0.5) * PARALLAX;
        n.rx = n.x - px * shift;
        n.ry = n.y - py * shift;
      }

      ctx.clearRect(0, 0, w, h);

      // links between nearby nodes — reach + brightness scale with depth
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const dx = a.rx - b.rx, dy = a.ry - b.ry;
          const d = Math.hypot(dx, dy);
          const zAvg = (a.z + b.z) / 2;
          const reach = LINK * (0.7 + zAvg * 0.6);   // nearer pairs link over more distance
          if (d < reach) {
            const t = 1 - d / reach;
            // brighten links whose midpoint is near the pointer
            let glow = 0;
            if (ptr.active) {
              const mx = (a.rx + b.rx) / 2 - eased.x;
              const my = (a.ry + b.ry) / 2 - eased.y;
              const pd = Math.hypot(mx, my);
              if (pd < PTR) glow = (1 - pd / PTR) ** 2;
            }
            const alpha = (0.03 + t * 0.08) * (0.45 + zAvg * 0.85) + glow * 0.3;
            ctx.strokeStyle = `rgba(${RGB},${alpha})`;
            ctx.lineWidth = (0.4 + zAvg * 0.7) + glow * 0.6;
            ctx.beginPath();
            ctx.moveTo(a.rx, a.ry);
            ctx.lineTo(b.rx, b.ry);
            ctx.stroke();
          }
        }
      }

      // nodes — size + brightness scale with depth
      for (const n of nodes) {
        let r = 0.5 + n.z * 1.8;
        let a = 0.18 + n.z * 0.42;
        if (ptr.active) {
          const pd = Math.hypot(n.rx - eased.x, n.ry - eased.y);
          if (pd < PTR) {
            const e = (1 - pd / PTR) ** 2;
            r += e * 1.8;
            a = Math.min(1, a + e * 0.5);
          }
        }
        ctx.beginPath();
        ctx.arc(n.rx, n.ry, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${RGB},${a})`;
        ctx.fill();
      }
    };

    let raf = 0;
    const loop = () => { step(); raf = requestAnimationFrame(loop); };

    const onMove = (e) => { ptr.x = e.clientX; ptr.y = e.clientY; ptr.active = true; };
    const onLeave = () => { ptr.active = false; };

    if (reduce) {
      // single static frame, no motion or pointer tracking
      step();
    } else {
      window.addEventListener("pointermove", onMove, { passive: true });
      window.addEventListener("pointerdown", onMove, { passive: true });
      document.addEventListener("pointerleave", onLeave);
      loop();
    }
    window.addEventListener("resize", resize);

    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerdown", onMove);
      document.removeEventListener("pointerleave", onLeave);
      window.removeEventListener("resize", resize);
      if (raf) cancelAnimationFrame(raf);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      aria-hidden="true"
      className="pointer-events-none fixed inset-0 -z-10"
    />
  );
}

/* ---------- typewriter rotating role ---------- */
function useTypewriter(words, { type = 75, del = 38, hold = 1600 } = {}) {
  const [text, setText] = useState("");
  const [i, setI] = useState(0);
  const [del_, setDel] = useState(false);
  useEffect(() => {
    const word = words[i % words.length];
    let t;
    if (!del_ && text === word) {
      t = setTimeout(() => setDel(true), hold);
    } else if (del_ && text === "") {
      setDel(false);
      setI((v) => (v + 1) % words.length);
    } else {
      t = setTimeout(() => {
        setText((cur) => del_ ? word.slice(0, cur.length - 1) : word.slice(0, cur.length + 1));
      }, del_ ? del : type);
    }
    return () => clearTimeout(t);
  }, [text, del_, i, words, type, del, hold]);
  return text;
}

/* ---------- scroll reveal hook ---------- */
/* element starts hidden (translated down + faded), then animates in the first
   time it scrolls into view. */
function useReveal() {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setShown(true); return; }
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) { setShown(true); io.disconnect(); }
        });
      },
      { threshold: 0.18, rootMargin: "0px 0px -8% 0px" }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return [ref, shown];
}

        {/* window title bar */}
        <div className="flex shrink-0 items-center justify-between border-b border-line bg-ink/60 px-5 py-3">
          <div className="flex items-center gap-2">
            <span className="h-3 w-3 rounded-full bg-[#ff5f57]"></span>
            <span className="h-3 w-3 rounded-full bg-[#febc2e]"></span>
            <span className="h-3 w-3 rounded-full bg-acc"></span>
            <span className="ml-3 hidden font-mono text-xs text-dim sm:inline">~/projects/{project.id} — readme.md</span>
          </div>
          <button onClick={onClose} aria-label="Close" className="flex h-8 w-8 items-center justify-center rounded-md text-dim transition-colors hover:bg-panel2 hover:text-acc"><X size={18} /></button>
        </div>
        {/* scrollable body */}
        <div className="flex-1 overflow-y-auto p-6 sm:p-8">
          <div className="ph mb-6 flex h-48 items-center justify-center rounded-lg border border-line sm:h-60">
            <span className="font-mono text-xs text-dim">// product shot</span>
          </div>
          <h3 className="mb-2 font-mono text-2xl font-bold text-fg">{project.title}</h3>
          <p className="mb-6 font-mono text-xs text-acc">&lt; {project.tags.join(" · ")} /&gt;</p>
          <p className="mb-7 leading-relaxed text-mut">{project.detail}</p>
          <div className="flex flex-wrap gap-3 border-t border-line pt-6">
            {project.github && (
              <a href={project.github} className="inline-flex items-center gap-2 rounded-md bg-acc px-4 py-2 font-mono text-sm font-semibold text-ink transition-all hover:-translate-y-0.5">
                <Github size={15} /> Code
              </a>
            )}
            {project.demo && (
              <a href={project.demo} className="inline-flex items-center gap-2 rounded-md border border-line2 px-4 py-2 font-mono text-sm text-mut transition-colors hover:border-acc hover:text-acc">
                <ExternalLink size={15} /> Demo
              </a>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- projects ---------- */
function Projects() {
  const [active, setActive] = useState(null);
  return (
    <section id="projects" className="px-6 py-28">
      <div className="mx-auto max-w-5xl">
        <SectionHead index="02">作品集</SectionHead>
        <div className="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
          {projects.map((project, idx) => (
            <ProjectCard key={project.id} project={project} index={String(idx + 1).padStart(2, "0")} onOpen={setActive} delay={idx * 120} />
          ))}
        </div>
      </div>
      {active && <ProjectModal project={active} onClose={() => setActive(null)} />}
    </section>
  );
}

/* ---------- contact ---------- */
function Field({ label, prompt, children }) {
  return (
    <div>
      <label className="mb-2 flex items-center gap-2 font-mono text-sm text-mut">
        <span className="text-acc">{prompt}</span> {label}
      </label>
      {children}
    </div>
  );
}
const inputCls = "w-full rounded-lg border border-line bg-panel px-4 py-3 text-fg placeholder-dim outline-none transition-all focus:border-acc focus:shadow-[0_0_0_3px_rgba(170,204,0,0.15)]";

function Contact() {
  const [formStatus, setFormStatus] = useState("idle");
  return (
    <section id="contact" className="px-6 py-28">
      <div className="mx-auto max-w-lg">
        <SectionHead index="03">聯絡我</SectionHead>
        <p className="mb-10 text-mut">有任何問題或合作邀約，歡迎傳訊息給我。</p>
        {formStatus === "sent" ? (
          <div className="rounded-xl border border-acc/40 bg-accdim/60 p-6 font-mono text-acc">
            <span className="mr-1">✓</span> 訊息已送出！我會盡快回覆。
          </div>
        ) : (
          <form onSubmit={(e) => { e.preventDefault(); setFormStatus("sent"); }} className="flex flex-col gap-5">
            <Field label="姓名" prompt="$">
              <input required placeholder="Your Name" className={inputCls} />
            </Field>
            <Field label="Email" prompt="$">
              <input type="email" required placeholder="your@email.com" className={inputCls} />
            </Field>
            <Field label="訊息" prompt="$">
              <textarea required rows={5} placeholder="Write your message..." className={inputCls + " resize-none"} />
            </Field>
            <button type="submit"
              className="group inline-flex items-center justify-center gap-2 rounded-lg bg-acc px-6 py-3 font-mono font-semibold text-ink transition-all hover:-translate-y-0.5 hover:shadow-[0_8px_30px_-8px_rgba(170,204,0,0.5)]">
              送出訊息 <span className="transition-transform group-hover:translate-x-1">→</span>
            </button>
          </form>
        )}
      </div>
    </section>
  );
}

/* ---------- footer ---------- */
function Footer() {
  return (
    <footer className="border-t border-line px-6 py-8">
      <div className="mx-auto flex max-w-5xl flex-col items-center justify-between gap-3 font-mono text-sm text-dim sm:flex-row">
        <span>© 2025 Kevin · Built with React &amp; Tailwind CSS</span>
        <span className="flex items-center gap-2">
          <span className="h-2 w-2 rounded-full bg-acc shadow-[0_0_8px_rgba(170,204,0,0.8)]"></span>
          available for work
        </span>
      </div>
    </footer>
  );
}

function Portfolio() {
  return (
    <div className="relative min-h-screen">
      <MeshBackground />
      <Navbar />
      <Hero />
      <Projects />
      <Contact />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Portfolio />);
</script>
</body>
</html>
